<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sistema de Conselho de Classe</title>

<style>

body{
font-family: Arial;
background:#f0f0f0;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.login-box{
background:white;
padding:25px;
border-radius:10px;
box-shadow:0px 0px 10px gray;
width:90%;
max-width:350px;
text-align:center;
}

input{
width:100%;
padding:10px;
margin:8px 0;
}

button{
width:100%;
padding:10px;
background:#2c7be5;
color:white;
border:none;
border-radius:5px;
}

</style>

</head>

<body>

<div class="login-box">

<h2>Sistema de Conselho de Classe</h2>

<form action="/entrar" method="post">

<input type="text" name="usuario" placeholder="Usuário">

<input type="password" name="senha" placeholder="Senha">

<button type="submit">Entrar</button>

</form>

</div>

</body>

</html>
