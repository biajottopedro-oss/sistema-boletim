<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sistema de Conselho de Classe</title>

<style>

body{
font-family: Arial, sans-serif;
background-color:#f0f0f0;
margin:0;
padding:0;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.login-box{
background:white;
width:90%;
max-width:350px;
padding:25px;
border-radius:10px;
box-shadow:0px 0px 10px rgba(0,0,0,0.2);
text-align:center;
}

h2{
margin-bottom:20px;
}

input{
width:100%;
padding:10px;
margin:8px 0;
border-radius:5px;
border:1px solid #ccc;
font-size:16px;
}

button{
width:100%;
padding:12px;
margin-top:10px;
background:#2c7be5;
color:white;
border:none;
border-radius:5px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#1a5dc9;
}

</style>

</head>

<body>

<div class="login-box">

<h2>Sistema de Conselho de Classe</h2>

<input type="text" placeholder="Usuário">

<input type="password" placeholder="Senha">

<button>Entrar</button>

</div>

</body>

</html>
