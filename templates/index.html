<!DOCTYPE html>
<html>
<head>

<title>Sistema de Conselho de Classe</title>

<style>

body{
font-family: Arial;
background-color:#f0f0f0;
text-align:center;
}

.login-box{
background:white;
width:300px;
margin:auto;
margin-top:100px;
padding:20px;
border-radius:10px;
box-shadow:0px 0px 10px gray;
}

input{
width:90%;
padding:8px;
margin:5px;
}

button{
padding:10px;
width:100%;
background:#2c7be5;
color:white;

border-radius:5px;
}

</style>

</head>

<body>

<div class="login-box">

<h2>Sistema de Conselho de Classe</h2>

<input type="text" placeholder="Usuário"><br>

<input type="password" placeholder="Senha"><br>

<button>Entrar</button>

</div>

</body>
</html>
