<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
font-family:Arial;
margin:0;
background:#f4f6f9;
}

.topo{
background:#2c7be5;
color:white;
padding:15px;
font-size:20px;
text-align:center;
}

.conteudo{
max-width:900px;
margin:auto;
padding:30px;
}

.card{
background:white;
padding:20px;
margin:15px 0;
border-radius:8px;
box-shadow:0px 0px 8px rgba(0,0,0,0.1);
text-align:center;
}

.botao{
display:block;
background:#2c7be5;
color:white;
padding:15px;
margin:10px auto;
width:220px;
border-radius:8px;
text-decoration:none;
font-size:18px;
}

</style>

</head>

<body>

<div class="topo">
Sistema de Conselho de Classe
</div>

<div class="conteudo">

{% block conteudo %}
{% endblock %}

</div>

</body>

</html>
